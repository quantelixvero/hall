<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DC Hostel | Students</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="students">
  <header class="navbar" id="navbar">
    <div class="container nav-inner">
      <a class="logo" href="index.html" aria-label="DC Hostel home">
        <span class="logo-mark">DC</span>
        <span data-i18n="nav.logo">DC Hostel</span>
      </a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a href="index.html" data-i18n="nav.home">Home</a>
        <a href="students.html" class="active" data-i18n="nav.students">Students</a>
        <a href="roommates.html" data-i18n="nav.roommates">Roommates</a>
        <a href="results.html" data-i18n="nav.results">Results</a>
        <a href="hostel.html" data-i18n="nav.hostel">Hostel Info</a>
      </nav>
      <div class="nav-actions">
        <div class="language-switch" aria-label="Language selector">
          <button type="button" data-lang-option="en">English</button>
          <button type="button" data-lang-option="bn">বাংলা</button>
        </div>
        <button class="theme-toggle" id="toggle" type="button" aria-label="Toggle dark mode">
          <span aria-hidden="true">&#9789;</span>
        </button>
      </div>
    </div>
  </header>

  <main class="page-main">
    <section class="page-hero compact">
      <div class="container" data-aos="fade-up">
        <p class="eyebrow" data-i18n="common.students">Students</p>
        <h1 data-i18n="students.title">Student Directory</h1>
        <p data-i18n="students.subtitle">Profiles, contact details, rooms, goals and academic summary in one searchable list.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="search-wrap" data-aos="fade-up">
          <label for="studentSearch" class="sr-only" data-i18n="common.searchStudents">Search students</label>
          <input id="studentSearch" class="search-input" type="search" placeholder="Search by name, room, phone, blood group or address" data-i18n-placeholder="common.searchPlaceholderFull">
        </div>
        <div class="student-grid" id="studentGrid"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <p data-i18n="footer.demo">&copy; 2026 DC Hostel. Student information demo.</p>
      <p data-i18n="footer.credits">Photo credits: Wikimedia Commons CC BY-SA 4.0; demo portraits from Random User.</p>
    </div>
  </footer>

  <div class="modal" id="studentModal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modalName">
    <div class="modal-backdrop" data-close-modal></div>
    <article class="modal-panel">
      <button class="modal-close" type="button" aria-label="Close student profile" data-close-modal>&times;</button>
      <div id="modalContent"></div>
    </article>
  </div>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
