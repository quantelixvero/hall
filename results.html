<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DC Hostel | Results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="results">
  <header class="navbar" id="navbar">
    <div class="container nav-inner">
      <a class="logo" href="index.html" aria-label="DC Hostel home">
        <span class="logo-mark">DC</span>
        <span>DC Hostel</span>
      </a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a href="index.html">Home</a>
        <a href="students.html">Students</a>
        <a href="roommates.html">Roommates</a>
        <a href="results.html" class="active">Results</a>
        <a href="hostel.html">Hostel Info</a>
      </nav>
      <button class="theme-toggle" id="toggle" type="button" aria-label="Toggle dark mode">
        <span aria-hidden="true">&#9789;</span>
      </button>
    </div>
  </header>

  <main class="page-main">
    <section class="page-hero results-hero compact">
      <div class="container" data-aos="fade-up">
        <p class="eyebrow">Results</p>
        <h1>Academic Results</h1>
        <p>GPA and subject marks for hostel students.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="table-shell" data-aos="fade-up">
          <table class="result-table">
            <thead>
              <tr>
                <th>Student</th>
                <th>Room</th>
                <th>GPA</th>
                <th>Physics</th>
                <th>Chemistry</th>
                <th>Math</th>
              </tr>
            </thead>
            <tbody id="resultTable"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <p>&copy; 2026 DC Hostel. Student information demo.</p>
      <p>Photo credits: Wikimedia Commons CC BY-SA 4.0; demo portraits from Random User.</p>
    </div>
  </footer>

  <div class="modal" id="studentModal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modalName">
    <div class="modal-backdrop" data-close-modal></div>
    <article class="modal-panel">
      <button class="modal-close" type="button" aria-label="Close student profile" data-close-modal>&times;</button>
      <div id="modalContent"></div>
    </article>
  </div>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
